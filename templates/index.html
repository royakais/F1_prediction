<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>F1 2026 Season Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:    #E10600;
      --red2:   #FF1801;
      --dark:   #0A0A0F;
      --dark2:  #13131A;
      --card:   #1A1A24;
      --border: #2A2A38;
      --text:   #F0F0F0;
      --muted:  #8080A0;
      --gold:   #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;

      /* Team colours */
      --mercedes:     #27F4D2;
      --ferrari:      #E8002D;
      --mclaren:      #FF8000;
      --redbull:      #3671C6;
      --alpine:       #FF87BC;
      --astonmartin:  #229971;
      --audi:         #C8102E;
      --cadillac:     #AC162C;
      --haas:         #B6BABD;
      --racingbulls:  #6692FF;
      --williams:     #64C4FF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HERO ─────────────────────────────────────────── */
    .hero {
      position: relative;
      text-align: center;
      padding: 60px 20px 50px;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(225,6,0,.35) 0%, transparent 70%),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.025) 40px);
      pointer-events: none;
    }
    .hero-inner { position: relative; z-index: 1; }

    /* F1 Logo SVG */
    .f1-logo svg { display: block; margin: 0 auto; }

    .hero-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      margin-top: 18px;
      position: relative;
    }
    .hero-subtitle span { color: var(--red2); }

    .hero-divider {
      width: 120px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--red2), transparent);
      margin: 20px auto 0;
      border-radius: 2px;
    }

    /* ── GRID ─────────────────────────────────────────── */
    .grid-section {
      padding: 0 clamp(16px, 3vw, 48px) 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 32px;
    }

    .team-block { margin-bottom: 36px; }

    .team-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .team-stripe {
      width: 4px;
      height: 28px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text);
    }
    .team-sep {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .drivers-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── DRIVER CARD ──────────────────────────────────── */
    .driver-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      position: relative;
    }

    .driver-card img {
      width: 100%;
      height: 300px; /* Adjust height to match your cards */
      object-fit: cover;
      object-position: top; /* This forces the crop to stay at the head/shoulders level */
      transition: transform .4s;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.3));
    }
    .driver-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,.6);
    }
    .driver-card.selected {
      border-width: 2px;
      box-shadow: 0 0 0 1px currentColor, 0 12px 40px rgba(0,0,0,.5);
    }

    .card-color-bar {
      height: 4px;
      width: 100%;
    }

    .card-img-wrap {
      position: relative;
      height: 180px;
      background: linear-gradient(180deg, #1a1a2e 0%, #0d0d18 100%);
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom center;
      transition: transform .4s;
      filter: none;
    }
    .driver-card:hover .card-img-wrap img { transform: scale(1.04); }
    .card-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      opacity: .3;
    }

    .card-info {
      padding: 10px 12px 12px;
    }
    .driver-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .driver-name-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: .04em;
      color: var(--text);
      margin-top: 2px;
      text-transform: uppercase;
    }

    .predict-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 8px 0;
      background: var(--red2);
      border: none;
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #fff;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .predict-btn:hover { background: #c40000; }
    .predict-btn:active { transform: scale(.97); }

    /* ── RESULT PANEL ─────────────────────────────────── */
    .result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .result-overlay.active { display: flex; }

    .result-panel {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      animation: popIn .3s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes popIn {
      from { opacity:0; transform: scale(.88); }
      to   { opacity:1; transform: scale(1); }
    }

    .result-header {
      height: 6px;
    }

    .result-body { padding: 36px 32px 32px; text-align: center; }

    .result-driver-img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: contain;
      object-position: center;
      border: none;
      background: linear-gradient(180deg, #1a1a2e, #0d0d18);
      margin: 0 auto 16px;
      display: block;
      filter: none;
    }
    .result-driver-placeholder {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: var(--card);
      border: 3px solid var(--border);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .result-driver-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text);
    }
    .result-team {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .result-divider { height: 1px; background: var(--border); margin: 24px 0; }

    .result-position {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
    }
    .result-position sup {
      font-size: 2rem;
      vertical-align: super;
      margin-left: 2px;
    }

    .result-group-badge {
      display: inline-block;
      padding: 6px 20px;
      border-radius: 100px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .badge-top3    { background: rgba(255,215,0,.15); color: var(--gold); border: 1px solid rgba(255,215,0,.4); }
    .badge-top10   { background: rgba(100,180,255,.12); color: #64b5ff; border: 1px solid rgba(100,180,255,.35); }
    .badge-others  { background: rgba(128,128,160,.12); color: var(--muted); border: 1px solid rgba(128,128,160,.35); }

    .result-close {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 12px 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .result-close:hover { border-color: var(--text); color: var(--text); }

    /* ordinal suffix colours by position */
    .pos-1  { color: var(--gold); }
    .pos-2  { color: var(--silver); }
    .pos-3  { color: var(--bronze); }
    .pos-top10  { color: #64b5ff; }
    .pos-other  { color: var(--muted); }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 768px) {
      .grid-section { grid-template-columns: 1fr; }
    }
    @media (max-width: 500px) {
      .drivers-row { grid-template-columns: 1fr; }
      .card-img-wrap { height: 200px; }
    }
  </style>
</head>
<body>

<!-- ── HERO ───────────────────────────────────────────── -->
<div class="hero">
  <div class="hero-inner">
    <!-- Official F1 Logo -->
    <div class="f1-logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/F1.svg/500px-F1.svg.png" alt="F1 Logo" style="height:80px;display:block;margin:0 auto;" onerror="this.style.display='none';document.getElementById('f1-fallback').style.display='block'">
      <svg id="f1-fallback" style="display:none" width="200" height="76" viewBox="0 0 814 320" xmlns="http://www.w3.org/2000/svg">
        <rect width="814" height="320" fill="#E10600"/>
        <!-- F letter -->
        <rect x="40" y="40" width="200" height="50" fill="white"/>
        <rect x="40" y="40" width="50" height="240" fill="white"/>
        <rect x="40" y="155" width="160" height="50" fill="white"/>
        <!-- 1 letter -->
        <rect x="310" y="40" width="50" height="240" fill="white"/>
        <rect x="270" y="90" width="50" height="50" fill="white"/>
        <!-- speed chevron -->
        <polygon points="440,40 814,40 814,280 540,280 650,160" fill="white"/>
      </svg>
    </div>
    <div class="hero-subtitle">2026 Season <span>Predictions</span></div>
    <div class="hero-divider"></div>
  </div>
</div>

<!-- ── DRIVER GRID ─────────────────────────────────────── -->
<div class="grid-section" id="teamGrid"></div>

<!-- ── RESULT OVERLAY ─────────────────────────────────── -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-panel">
    <div class="result-header" id="resultHeader"></div>
    <div class="result-body">
      <div id="resultImgWrap"></div>
      <div class="result-driver-name" id="resultDriverName"></div>
      <div class="result-team" id="resultTeamName"></div>
      <div class="result-divider"></div>
      <div class="result-position" id="resultPosition"></div>
      <div id="resultGroupBadge"></div>
      <button class="result-close" onclick="closeResult()">Close</button>
    </div>
  </div>
</div>

<script>
  // ── Data injected by Flask ─────────────────────────────
  const DRIVER_DATA = JSON.parse('{{ driver_data | tojson | safe }}');
  // DRIVER_DATA: { "Driver Name": { team, reg_pos, group }, ... }

  const TEAM_COLORS = {
    "Mercedes":     "#27F4D2",
    "Ferrari":      "#E8002D",
    "McLaren":      "#FF8000",
    "Red Bull":     "#3671C6",
    "Alpine":       "#FF87BC",
    "Aston Martin": "#229971",
    "Audi":         "#C8102E",
    "Cadillac":     "#AC162C",
    "Haas":         "#B6BABD",
    "Racing Bulls": "#6692FF",
    "Williams":     "#64C4FF",
  };

  // ── Group teams ───────────────────────────────────────
  const teamMap = {};
  for (const [driver, info] of Object.entries(DRIVER_DATA)) {
    if (!teamMap[info.team]) teamMap[info.team] = [];
    teamMap[info.team].push(driver);
  }
  const teamsOrdered = Object.keys(teamMap).sort();

  // ── Image fetching via Flask proxy ───────────────────
  // Images are fetched server-side through /proxy_image, which
  // calls Wikipedia on the backend — no CORS or hotlink issues.
  const imgCache = {};

  async function fetchImage(driver) {
    if (imgCache[driver] !== undefined) return imgCache[driver];
    // Use proxy route — Flask fetches Wikipedia server-side
    imgCache[driver] = `/proxy_image?driver=${encodeURIComponent(driver)}`;
    return imgCache[driver];
  }

  // ── Build Grid ────────────────────────────────────────
  function ordinal(n) {
    const s = ['th','st','nd','rd'], v = n % 100;
    return n + (s[(v-20)%10] || s[v] || s[0]);
  }

  function posClass(p) {
    if (p === 1) return 'pos-1';
    if (p === 2) return 'pos-2';
    if (p === 3) return 'pos-3';
    if (p <= 10) return 'pos-top10';
    return 'pos-other';
  }

  const grid = document.getElementById('teamGrid');

  teamsOrdered.forEach(team => {
    const color  = TEAM_COLORS[team] || '#888';
    const drivers = teamMap[team];

    const block = document.createElement('div');
    block.className = 'team-block';
    block.innerHTML = `
      <div class="team-header">
        <div class="team-stripe" style="background:${color}"></div>
        <div class="team-name">${team}</div>
        <div class="team-sep"></div>
      </div>
      <div class="drivers-row" id="row-${team.replace(/\s+/g,'_')}"></div>
    `;
    grid.appendChild(block);

    const row = block.querySelector('.drivers-row');
    drivers.forEach(driver => {
      const card = document.createElement('div');
      card.className = 'driver-card';
      card.id = 'card-' + driver.replace(/\s+/g,'_');
      card.style.setProperty('--team-color', color);
      card.innerHTML = `
        <div class="card-color-bar" style="background:${color}"></div>
        <div class="card-img-wrap">
          <div class="card-img-placeholder" id="placeholder-${driver.replace(/\s+/g,'_')}">🏎</div>
          <img id="img-${driver.replace(/\s+/g,'_')}" src="" alt="${driver}" style="display:none;position:absolute;inset:0;">
        </div>
        <div class="card-info">
          <div class="driver-number">${team}</div>
          <div class="driver-name-text">${driver}</div>
          <button class="predict-btn" onclick="showResult('${driver}')">Predict Position</button>
        </div>
      `;
      card.addEventListener('click', e => {
        if (e.target.classList.contains('predict-btn')) return;
        document.querySelectorAll('.driver-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        card.style.borderColor = color;
      });
      row.appendChild(card);

      // Load image via proxy
      fetchImage(driver).then(url => {
        if (url) {
          const img = document.getElementById('img-' + driver.replace(/\s+/g,'_'));
          const ph  = document.getElementById('placeholder-' + driver.replace(/\s+/g,'_'));
          img.src = url;
          img.onload = () => { img.style.display = 'block'; ph.style.display = 'none'; };
          img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
        }
      });
    });
  });

  // ── Show Result ───────────────────────────────────────
  async function showResult(driver) {
    const info  = DRIVER_DATA[driver];
    const color = TEAM_COLORS[info.team] || '#888';
    const pos   = info.reg_pos;
    const group = info.group;
    const suffix = ['th','st','nd','rd'];
    const v = pos % 100;
    const suf = suffix[(v-20)%10] || suffix[v] || suffix[0];

    // position colour
    let pClass = posClass(pos);

    // group badge
    let badgeClass = 'badge-others', badgeLabel = group;
    if (group === 'Top 3')  { badgeClass = 'badge-top3';  badgeLabel = '🏆 Top 3'; }
    if (group === 'Top 10') { badgeClass = 'badge-top10'; badgeLabel = '✅ Top 10'; }
    if (group === 'Others') { badgeClass = 'badge-others'; badgeLabel = '❌ Outside Top 10'; }

    // header gradient
    document.getElementById('resultHeader').style.background = color;

    // driver image
    const imgUrl = await fetchImage(driver);
    const imgWrap = document.getElementById('resultImgWrap');
    if (imgUrl) {
      imgWrap.innerHTML = `<img class="result-driver-img" src="${imgUrl}" alt="${driver}">`;
    } else {
      imgWrap.innerHTML = `<div class="result-driver-placeholder">🏎</div>`;
    }

    document.getElementById('resultDriverName').textContent = driver;
    document.getElementById('resultTeamName').textContent   = info.team;
    document.getElementById('resultPosition').innerHTML =
      `<span class="${pClass}">${pos}<sup>${suf}</sup></span>`;
    document.getElementById('resultGroupBadge').innerHTML =
      `<span class="result-group-badge ${badgeClass}">${badgeLabel}</span>`;

    document.getElementById('resultOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeResult() {
    document.getElementById('resultOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.getElementById('resultOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeResult();
  });
</script>
</body>
</html>
